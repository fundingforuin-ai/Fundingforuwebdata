<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Fundings4U</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#050510;font-family:'Inter',sans-serif;color:#e3e0f3;overflow-x:hidden}

/* Animated background */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:40px 40px;animation:driftGrid 15s linear infinite}
@keyframes driftGrid{0%{background-position:0 0}100%{background-position:40px 40px}}
.bg-orb1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.15),transparent 70%);top:-150px;left:-150px;animation:pulse 7s ease-in-out infinite alternate}
.bg-orb2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(99,30,200,0.1),transparent 70%);bottom:-100px;right:-100px;animation:pulse 9s ease-in-out infinite alternate-reverse}
@keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.15);opacity:1}}

/* Layout */
.auth-wrapper{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{width:100%;max-width:440px;background:rgba(14,12,30,0.85);border:1px solid rgba(124,58,237,0.2);border-radius:24px;padding:44px 40px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05)}

/* Logo */
.logo{text-align:center;margin-bottom:32px}
.logo a{font-family:'Hanken Grotesk',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.04em;color:#e3e0f3;text-decoration:none}
.logo a span{color:#d2bbff}
.logo-sub{font-size:13px;color:#635c79;margin-top:4px}

/* Form */
.form-title{font-family:'Hanken Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;color:#e3e0f3}
.form-desc{font-size:13px;color:#6b6280;margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#958da1;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.form-group input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:13px 16px;font-size:14px;color:#e3e0f3;outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Inter',sans-serif}
.form-group input:focus{border-color:rgba(124,58,237,0.6);box-shadow:0 0 0 3px rgba(124,58,237,0.12)}
.form-group input::placeholder{color:#4a4360}

/* Password wrapper */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#635c79;font-size:16px;line-height:1;transition:color .2s}
.pw-toggle:hover{color:#d2bbff}

/* Forgot link */
.forgot{text-align:right;margin-top:-10px;margin-bottom:18px}
.forgot a{font-size:12px;color:#7c5fc0;text-decoration:none;font-weight:500}
.forgot a:hover{color:#d2bbff}

/* Button */
.btn-auth{width:100%;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:.04em;padding:14px;border:none;border-radius:10px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;margin-top:4px}
.btn-auth::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#9f5fff,#7c3aed);opacity:0;transition:opacity .25s}
.btn-auth:hover::before{opacity:1}
.btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,58,237,0.45)}
.btn-auth:active{transform:translateY(0)}
.btn-auth span{position:relative;z-index:1}
.btn-auth.loading .btn-text{opacity:0}
.btn-auth.loading::after{content:'';position:absolute;inset:0;margin:auto;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:#3a3454;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* Footer link */
.auth-footer{text-align:center;margin-top:24px;font-size:13px;color:#635c79}
.auth-footer a{color:#a78bfa;text-decoration:none;font-weight:600}
.auth-footer a:hover{color:#d2bbff}

/* Error */
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none}
.error-msg.show{display:block;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Success */
.success-msg{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#6ee7b7;margin-bottom:16px;display:none}
.success-msg.show{display:block}

/* Responsive */
@media(max-width:480px){
  .auth-card{padding:32px 22px;border-radius:20px}
  .logo a{font-size:22px}
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">
      <a href="/">Fundings<span>4U</span></a>
      <div class="logo-sub">Trader Portal</div>
    </div>

    <div class="form-title">Welcome Back</div>
    <div class="form-desc">Sign in to your trading dashboard</div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="trader@example.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw()" id="pwToggle">👁</button>
        </div>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="btn-auth" id="loginBtn">
        <span class="btn-text">Sign In →</span>
      </button>
    </form>

    <div class="divider">or</div>
    <div class="auth-footer">
      Don't have an account? <a href="/signup">Create account</a>
    </div>
    <div class="auth-footer" style="margin-top:10px">
      <a href="/" style="color:#4a4360;font-size:12px;">← Back to website</a>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pwToggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🔒'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  const suc = document.getElementById('successMsg');
  err.classList.remove('show');
  btn.classList.add('loading');

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');

    localStorage.setItem('f4u_token', data.token);
    localStorage.setItem('f4u_user', JSON.stringify(data.user));
    suc.textContent = 'Login successful! Redirecting...';
    suc.classList.add('show');

    setTimeout(() => {
      if (data.user.role === 'admin') { window.location.href = '/admin'; return; }
      // If user came from pricing page with a plan selected, go to checkout
      const pendingPlan = localStorage.getItem('f4u_pending_plan');
      window.location.href = pendingPlan ? '/checkout' : '/dashboard';
    }, 700);
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.add('show');
    btn.classList.remove('loading');
  }
});

// Check if already logged in
if (localStorage.getItem('f4u_token')) {
  const user = JSON.parse(localStorage.getItem('f4u_user') || '{}');
  window.location.href = user.role === 'admin' ? '/admin' : '/dashboard';
}
</script>
</body>
</html>
